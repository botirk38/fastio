name: Bug report
description: Report a problem with fastio
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix the issue.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Please provide a small code snippet or command that reproduces the issue.
      render: rust
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g., Ubuntu 24.04, macOS 15, Windows 11
    validations:
      required: true
  - type: input
    id: rust-version
    attributes:
      label: Rust version
      placeholder: e.g., rustc 1.93.0
    validations:
      required: true
  - type: input
    id: features
    attributes:
      label: Feature flags
      placeholder: e.g., default, --no-default-features --features sync
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, logs, or error messages.
